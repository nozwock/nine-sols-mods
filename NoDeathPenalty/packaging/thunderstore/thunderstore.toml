[config]
schemaVersion = "0.0.1"

[package]
namespace = "nozwock"
name = "NoDeathPenalty"
versionNumber = "1.0.1"
description = "Removes money and experience loss on player's death"
websiteUrl = "https://github.com/nozwock/nine-sols-mods"

[package.dependencies]
BepInEx-BepInExPack = "5.4.2304"

[build]
icon = "./icon.png"
readme = "../../README.md"
outdir = "./build"

[[build.copy]]
source = "./dist"
target = ""

[publish]
communities = ["nine-sols"]


[publish.categories]
nine-sols = ["mods"]
