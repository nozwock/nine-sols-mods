[config]
schemaVersion = "0.0.1"

[package]
namespace = "nozwock"
name = "PerfectParry"
versionNumber = "1.0.0"
description = "Parries are always perfect"
websiteUrl = "https://github.com/nozwock/nine-sols-mods"

[package.dependencies]
BepInEx-BepInExPack = "5.4.2304"

[build]
icon = "./icon.png"
readme = "../../README.md"
outdir = "./build"

[[build.copy]]
source = "./dist"
