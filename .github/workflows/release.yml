name: Release
run-name: Release ${{ github.ref_name }} ${{ inputs.mod-name }} [${{ github.event_name }}]

on:
  push:
    tags:
      - "*/*"
  workflow_dispatch:
    inputs:
      mod-name:
        required: true
        type: string

jobs:
  build-mod:
    uses: ./.github/workflows/build-mod.yml
    with:
      mod-name: ${{ github.event.inputs.mod-name }}

  release:
    runs-on: ubuntu-latest
    needs: build-mod

    permissions:
      contents: write

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: publish-${{ needs.build-mod.outputs.mod-name }}

      - name: Extract artifact
        run: |
          Expand-Archive publish.zip publish

      - name: Prepare package
        id: package
        run: |
          $mod_name = "${{ needs.build-mod.outputs.mod-name }}"
          $version = "${{ needs.build-mod.outputs.version }}"
          $tmp = New-Item -ItemType Directory tmp

          New-Item -ItemType Directory "$tmp/BepInEx/plugins/$mod_name" -ea 0

          Move-Item publish/* "$tmp/BepInEx/plugins/$mod_name"

          $package = "$mod_name-$version.zip"

          Compress-Archive "$tmp/*" "$package"

          "package=$package" >> $env:GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.package }}
          tag_name: ${{ needs.build-mod.outputs.tag }}
